// ╔══════════════════════════════════════════════════════════════╗
// ║  GITHUB API LAYER                                            ║
// ╚══════════════════════════════════════════════════════════════╝

const DB_FILES = {
  'ms-outdoor':    'data/ms-outdoor.json',
  'ms-indoor':     'data/ms-indoor.json',
  'ms-materials':  'data/ms-materials.json',
  'wh-furnaces':   'data/wh-furnaces.json',
  'wh-heatpumps':  'data/wh-heatpumps.json',
  'wh-accondensers':'data/wh-accondensers.json',
  'wh-airhandlers':'data/wh-airhandlers.json',
  'wh-coils':      'data/wh-coils.json',
};

function getConfig() {
  try {
    const raw = localStorage.getItem('cb_github_config');
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function saveConfig(cfg) {
  localStorage.setItem('cb_github_config', JSON.stringify(cfg));
}

// SHA cache so we can update files (GitHub requires the current SHA)
const shaCache = {};

async function ghFetch(path, cfg, opts = {}) {
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Authorization': `token ${cfg.token}`,
      'Accept': 'application/vnd.github.v3+json',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`GitHub API ${res.status}: ${body.substring(0, 200)}`);
  }
  return res.json();
}

async function loadFile(path, cfg) {
  const data = await ghFetch(path, cfg);
  shaCache[path] = data.sha;
  const content = atob(data.content.replace(/\n/g, ''));
  return JSON.parse(content);
}

async function saveFile(path, content, cfg, message) {
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
  const body = {
    message: message || `Update ${path}`,
    content: encoded,
  };
  if (shaCache[path]) body.sha = shaCache[path];
  const data = await ghFetch(path, cfg, {
    method: 'PUT',
    body: JSON.stringify(body),
  });
  shaCache[path] = data.content.sha;
  return data;
}

async function loadAllData(cfg) {
  const results = {};
  const entries = Object.entries(DB_FILES);
  const errors = [];
  // Load all files in parallel
  const promises = entries.map(async ([key, path]) => {
    try {
      results[key] = await loadFile(path, cfg);
    } catch (e) {
      console.error(`Failed to load ${path}:`, e);
      errors.push(`${path}: ${e.message}`);
      results[key] = [];
    }
  });
  await Promise.all(promises);
  if (errors.length > 0) {
    // If ALL files failed, throw — something is fundamentally wrong
    if (errors.length === entries.length) {
      throw new Error(`All data files failed to load. First error: ${errors[0]}`);
    }
    // If some failed, log a warning so the user sees in console
    console.warn(`${errors.length} of ${entries.length} data files failed to load:`, errors);
  }
  return results;
}

          style={{width:'100%',padding:'12px',borderRadius:8,border:'none',cursor:'pointer',fontSize:14,fontWeight:800,
            background:testing?'#888':'linear-gradient(135deg,#10b981,#059669)',color:'#fff'}}>
          {testing ? 'Connecting...' : 'Connect & Load Database'}
        </button>

        {existing && <button onClick={()=>{const cfg=getConfig();if(cfg)onComplete(cfg)}}
          style={{width:'100%',padding:'10px',borderRadius:8,border:'1px solid #ddd',cursor:'pointer',fontSize:12,fontWeight:600,

// ║  GOOGLE DRIVE INTEGRATION                                     ║
// ║  Saves PDF estimates directly to user's Google Drive          ║
// ║                                                               ║
// ║  SETUP: You need a Google Cloud OAuth Client ID.              ║
// ║  1. Go to https://console.cloud.google.com/                   ║
// ║  2. Create a project (or use existing)                        ║

// ║     - http://localhost (for dev)                              ║
// ║  7. Add authorized redirect URIs: (same as origins)           ║

// ╚══════════════════════════════════════════════════════════════╝

function getGoogleClientId() {
  try { return localStorage.getItem('cb_google_client_id') || ''; }
  catch { return ''; }
}
function saveGoogleClientId(id) {
  localStorage.setItem('cb_google_client_id', id);
}

// In-memory OAuth token (not persisted for security)
let gDriveAccessToken = null;
let gDriveTokenClient = null;

function initGoogleTokenClient(clientId, onTokenReceived) {
  if (typeof google === 'undefined' || !google.accounts) {
    throw new Error('Google Identity Services not loaded. Check your internet connection.');
  }
  gDriveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: (tokenResponse) => {
      if (tokenResponse.error) {
        onTokenReceived(null, tokenResponse.error_description || tokenResponse.error);
        return;
      }
      gDriveAccessToken = tokenResponse.access_token;
      onTokenReceived(tokenResponse.access_token, null);
    },
  });
}

async function requestGoogleDriveToken(clientId) {
  return new Promise((resolve, reject) => {
    try {
      if (!gDriveTokenClient) {
        initGoogleTokenClient(clientId, (token, error) => {
          if (error) reject(new Error(error));
          else resolve(token);
        });
      } else {
        // Re-init callback for this promise
        const origClient = gDriveTokenClient;
        origClient.callback = (tokenResponse) => {
          if (tokenResponse.error) reject(new Error(tokenResponse.error_description || tokenResponse.error));
          else { gDriveAccessToken = tokenResponse.access_token; resolve(tokenResponse.access_token); }
        };
      }
      gDriveTokenClient.requestAccessToken();
    } catch (e) { reject(e); }
  });
}

async function uploadToGoogleDrive(accessToken, fileName, htmlContent) {
  // Convert HTML to a Blob
  const fileBlob = new Blob([htmlContent], { type: 'text/html' });

  // Multipart upload: metadata + file content
  const metadata = {
    name: fileName,
    mimeType: 'text/html',
  };

  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', fileBlob);

  const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + accessToken },
    body: form,
  });

  if (!res.ok) {
    const errBody = await res.text();
    throw new Error('Drive upload failed (' + res.status + '): ' + errBody.substring(0, 200));
  }
  return res.json();
}

// ╔══════════════════════════════════════════════════════════════╗
// ║  APP WRAPPER — handles GitHub loading + setup                ║
// ╚══════════════════════════════════════════════════════════════╝
function AppWrapper() {
  const [cfg, setCfg] = useState(null);
  const [dbData, setDbData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState('');

  useEffect(() => {
    const saved = getConfig();
    if (saved) {
      setCfg(saved);
      setLoading(true);
      loadAllData(saved)
        .then(data => { setDbData(data); setLoading(false); })
        .catch(e => { setLoadError(e.message); setLoading(false); });
    } else {
      setLoading(false);
    }
  }, []);

  const handleSetup = (newCfg) => {
    setCfg(newCfg);
    setLoading(true);
    setLoadError('');
    loadAllData(newCfg)
      .then(data => { setDbData(data); setLoading(false); })
      .catch(e => { setLoadError(e.message); setLoading(false); });
  };

  if (!cfg) return <SetupScreen onComplete={handleSetup} />;
  if (loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8fafc'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:32,marginBottom:12}}>❄️</div>
        <div style={{fontSize:16,fontWeight:700,color:'#1e293b'}}>Loading database from GitHub...</div>
        <div style={{fontSize:12,color:'#888',marginTop:4}}>{cfg.owner}/{cfg.repo}</div>
      </div>
    </div>
  );
  if (loadError) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8fafc'}}>
      <div style={{textAlign:'center',maxWidth:500}}>
        <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
        <div style={{fontSize:16,fontWeight:700,color:'#c00',marginBottom:8}}>Failed to load database</div>
        <div style={{fontSize:12,color:'#888',marginBottom:16}}>{loadError}</div>
        <button onClick={()=>{setCfg(null);setLoadError('')}} style={{padding:'10px 24px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:700,background:'#1e293b',color:'#fff'}}>Reconfigure</button>
      </div>
    </div>
  );

  const handleRefresh = () => {
    setLoading(true);
    setLoadError('');
    loadAllData(cfg)
      .then(data => { setDbData(data); setLoading(false); })
      .catch(e => { setLoadError(e.message); setLoading(false); });
  };

  return <App initialData={dbData} ghConfig={cfg} onReconfigure={()=>{setCfg(null);setDbData(null)}} onRefresh={handleRefresh} />;
}

        const rows=items.map(m=>({"Item Name":m.n,"Model":m.m||"","Brand":m.b||"","Description":m.d||"","Cost":m.p}));
        const ws=XLSX.utils.json_to_sheet(rows);ws["!cols"]=[{wch:55},{wch:22},{wch:12},{wch:30},{wch:10}];
        XLSX.utils.book_append_sheet(wb,ws,sheetMap[cat]||cat);
      });
    } else {
      [["Furnaces",whDb.FURNACES,["n","m","b","ton","btu","afue","cab","w","stg","p"],["Item Name","Model","Brand","Tonnage","BTU(k)","AFUE%","Cabinet","Width","Stages","Price"]],
       ["Heat Pumps",whDb.HEAT_PUMPS,["n","m","b","ton","seer","stg","p"],["Item Name","Model","Brand","Tonnage","SEER","Stages","Price"]],
       ["AC Condensers",whDb.AC_CONDENSERS,["n","m","b","ton","seer","stg","p"],["Item Name","Model","Brand","Tonnage","SEER","Stages","Price"]],
       ["Air Handlers",whDb.AIR_HANDLERS,["n","m","b","ton","btu","stg","v","p"],["Item Name","Model","Brand","Tonnage","BTU(k)","Stages","Voltage","Price"]],
       ["Evap Coils",whDb.COILS,["n","m","b","ton","w","p"],["Item Name","Model","Brand","Tonnage","Width","Price"]],
      ].forEach(([name,data,cols,headers])=>{
        const rows=data.map(item=>headers.reduce((obj,h,i)=>({...obj,[h]:item[cols[i]]??""})  ,{}));
        const ws=XLSX.utils.json_to_sheet(rows);ws["!cols"]=headers.map((_,i)=>({wch:i===0?55:i===1?22:12}));
        XLSX.utils.book_append_sheet(wb,ws,name);
      });
    }
    const wbOut=XLSX.write(wb,{bookType:"xlsx",type:"array"});
    const blob=new Blob([wbOut],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=mode==="minisplit"?"MiniSplit_Database.xlsx":"FW_Webb_HVAC_Database.xlsx";a.click();URL.revokeObjectURL(url);
  };

  // ===== MS INLINE EDIT FORM (plain function call to avoid focus loss) =====

      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Part / Model #</label><input value={msEqEditForm.m} onChange={e=>setMsEqEditForm(p=>({...p,m:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>

      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Cost $</label><input value={msEqEditForm.p} onChange={e=>setMsEqEditForm(p=>({...p,p:e.target.value}))} type="number" step="0.01" style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>
      <div style={{gridColumn:"1/3"}}><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Description</label><input value={msEqEditForm.d} onChange={e=>setMsEqEditForm(p=>({...p,d:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>
    </div>

      <button onClick={()=>msRemoveEqItem(type,item)} style={{padding:"3px 8px",borderRadius:3,border:"1px solid #c00",cursor:"pointer",fontSize:9,fontWeight:700,background:"#fff",color:"#c00",marginLeft:"auto"}}>🗑 Remove from DB</button>

  const MsAddEqForm=({type})=><div style={{background:"#e8f5e9",borderRadius:6,padding:8,marginBottom:6,border:"1px solid #c8e6c9"}}>
    <div style={{fontSize:10,fontWeight:700,color:"#059669",marginBottom:4}}>Add {type==="outdoor"?"Outdoor":"Indoor"} Unit to Database</div>

      <input value={msNewEq.m} onChange={e=>setMsNewEq(p=>({...p,m:e.target.value}))} placeholder="Part / Model #" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}/>
      <input value={msNewEq.b} onChange={e=>setMsNewEq(p=>({...p,b:e.target.value}))} placeholder="Brand" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}/>
      <input value={msNewEq.p} onChange={e=>setMsNewEq(p=>({...p,p:e.target.value}))} placeholder="Price" type="number" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}/>
      <input value={msNewEq.d} onChange={e=>setMsNewEq(p=>({...p,d:e.target.value}))} placeholder="Description" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10,gridColumn:"1/3"}}/>

  const WhAddEqForm=({cat})=>{
    const isFurnace=cat==="FURNACES",isCoil=cat==="COILS",isAH=cat==="AIR_HANDLERS",isHP=cat==="HEAT_PUMPS",isAC=cat==="AC_CONDENSERS";

        {(isFurnace||isCoil)&&inp("Width","w")}

        {isAH&&<select value={whNewEq.v} onChange={e=>setWhNewEq(p=>({...p,v:e.target.value}))} style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}><option value="">Voltage...</option><option value="115">115V</option><option value="208/230">208/230V</option><option value="220">220V</option></select>}

      <div style={{display:"flex",gap:4,marginTop:4}}>
        <button onClick={()=>whAddEquipment(cat)} style={{padding:"3px 12px",borderRadius:3,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:"#059669",color:"#fff"}}>Save</button>
        <button onClick={()=>setWhShowAddEq(null)} style={{padding:"3px 12px",borderRadius:3,border:"1px solid #999",cursor:"pointer",fontSize:9,fontWeight:700,background:"#fff",color:"#555"}}>Cancel</button>
      </div>
    </div>;
  };

                {syncStatus==='ok'?'Synced':syncStatus==='saving'?'Saving...':'Sync Error'}

            <div className="mob-header-btns" style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

            </div>
          </div>
          <div className="mob-sys-row" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>

            <BigBtn v="wholehouse" cur={mode} onClick={()=>setMode("wholehouse")} color="#c00">🏠 Whole House System</BigBtn>

          <span>💡</span><span><strong>✏️ Edit</strong> any item inline. <strong>🗑 Remove</strong> hides from database. All changes <strong>auto-save to GitHub</strong> instantly.</span>

        {/* ╔══════════════════════════════════════════════════════════════╗ */}
        {/* ║  MINI SPLIT MODE                                            ║ */}

        {mode==="minisplit"&&<>
          {/* MS Restore Panel */}
          {msTotalRemoved>0&&<button onClick={()=>setMsShowRemoved(p=>!p)} style={{padding:"5px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,background:"#f59e0b",color:"#fff",marginBottom:8}}>{msShowRemoved?"▲ Hide":"▼ Show"} Removed ({msTotalRemoved})</button>}

          {/* MS Customer Info */}
          <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>

                <h3 style={{margin:"0 0 10px",fontSize:14,fontWeight:800,color:"#1e293b"}}>Customer Information</h3>

                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Phone Number</label><input value={estClient.phone} onChange={e=>setEstClient(p=>({...p,phone:e.target.value}))} placeholder="(555) 555-5555" type="tel" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Email Address</label><input value={estClient.email} onChange={e=>setEstClient(p=>({...p,email:e.target.value}))} placeholder="client@email.com" type="email" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Billing Address</label><input value={estClient.addr1} onChange={e=>setEstClient(p=>({...p,addr1:e.target.value}))} placeholder="Street address" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Service Address</label><input value={estClient.svcAddr1} onChange={e=>setEstClient(p=>({...p,svcAddr1:e.target.value}))} placeholder="Street (if different)" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>

                      {...whEqProps}/>;
                  })}
                </div>
              </>:<Placeholder text="Select an air handler to see outdoor units"/>}
            </div>
          </div>
          )}

          {/* WH Materials & Labor Catalog (same as MS) */}
          <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <h3 style={{margin:0,fontSize:14,fontWeight:800,color:"#1e293b"}}>Materials & Labor Catalog</h3>
              <button onClick={()=>setMsShowAddDb(!msShowAddDb)} style={{padding:"4px 12px",borderRadius:5,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,background:msShowAddDb?"#c00":"#10b981",color:"#fff"}}>{msShowAddDb?"Cancel":"+ Add to Database"}</button>
            </div>
            {msShowAddDb&&<div style={{background:"#e8f5e9",borderRadius:8,padding:12,marginBottom:10,border:"1px solid #c8e6c9"}}>
              <div className="mob-add-form mob-touch" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <div><label style={{fontSize:9,fontWeight:700,color:"#555"}}>Name *</label><input value={msNewDbItem.n} onChange={e=>setMsNewDbItem(p=>({...p,n:e.target.value}))} style={{width:"100%",padding:"5px 8px",borderRadius:4,border:"1px solid #ccc",fontSize:11,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:9,fontWeight:700,color:"#555"}}>Model #</label><input value={msNewDbItem.m} onChange={e=>setMsNewDbItem(p=>({...p,m:e.target.value}))} style={{width:"100%",padding:"5px 8px",borderRadius:4,border:"1px solid #ccc",fontSize:11,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:9,fontWeight:700,color:"#555"}}>Brand</label><input value={msNewDbItem.b} onChange={e=>setMsNewDbItem(p=>({...p,b:e.target.value}))} style={{width:"100%",padding:"5px 8px",borderRadius:4,border:"1px solid #ccc",fontSize:11,boxSizing:"border-box"}}/></div>
                <div><label style={{fontSize:9,fontWeight:700,color:"#555"}}>Category</label><select value={msNewDbItem.cat} onChange={e=>setMsNewDbItem(p=>({...p,cat:e.target.value}))} style={{width:"100%",padding:"5px 8px",borderRadius:4,border:"1px solid #ccc",fontSize:11,boxSizing:"border-box",background:"#fff"}}><option value="">Select...</option>{msMatCats.map(c=><option key={c} value={c}>{c}</option>)}<option value="General">General</option></select></div>
                <div><label style={{fontSize:9,fontWeight:700,color:"#555"}}>Cost</label><div style={{display:"flex",gap:4}}><input value={msNewDbItem.p} onChange={e=>setMsNewDbItem(p=>({...p,p:e.target.value}))} placeholder="0.00" type="number" step="0.01" style={{flex:1,padding:"5px 8px",borderRadius:4,border:"1px solid #ccc",fontSize:11}}/><button onClick={msAddToDatabase} style={{padding:"5px 14px",borderRadius:5,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:"#059669",color:"#fff",whiteSpace:"nowrap"}}>Save</button></div></div>
              </div>
            </div>}
            <div className="mob-stack" style={{display:"grid",gridTemplateColumns:"1.2fr 0.8fr",gap:12}}>
              <div>
                <div className="mob-cat-scroll" style={{display:"flex",gap:3,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
                  <Btn v="All" cur={msMatCat} onClick={()=>setMsMatCat("All")}>All</Btn>
                  {msMatCats.map(c=><Btn key={c} v={c} cur={msMatCat} onClick={()=>setMsMatCat(c)}>{c}</Btn>)}
                </div>
                <input value={msMatSearch} onChange={e=>setMsMatSearch(e.target.value)} placeholder="Search materials..." style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #ddd",fontSize:12,marginBottom:8,boxSizing:"border-box"}}/>
                <div style={{background:"#fafafa",borderRadius:8,border:"1px solid #eee",maxHeight:380,overflowY:"auto"}}>
                  {msMatList.length===0?<div style={{padding:16,textAlign:"center",color:"#aaa",fontSize:11}}>No materials match.</div>:
                  msMatList.map((m,i)=>{
                  if(msCatEditIdx===i)return<div key={i} style={{padding:"8px 9px",borderBottom:"1px solid #eee",background:"#e3f2fd"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Name</label><input value={msCatEditForm.n} onChange={e=>setMsCatEditForm(p=>({...p,n:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #90CAF9",fontSize:10,boxSizing:"border-box"}}/></div>
                      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Model #</label><input value={msCatEditForm.m} onChange={e=>setMsCatEditForm(p=>({...p,m:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #90CAF9",fontSize:10,boxSizing:"border-box"}}/></div>
                      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Brand</label><input value={msCatEditForm.b} onChange={e=>setMsCatEditForm(p=>({...p,b:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #90CAF9",fontSize:10,boxSizing:"border-box"}}/></div>
                      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Category</label><select value={msCatEditForm.cat} onChange={e=>setMsCatEditForm(p=>({...p,cat:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #90CAF9",fontSize:10,boxSizing:"border-box",background:"#fff"}}>{msMatCats.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Cost</label><div style={{display:"flex",gap:4}}><input value={msCatEditForm.p} onChange={e=>setMsCatEditForm(p=>({...p,p:e.target.value}))} type="number" step="0.01" style={{flex:1,padding:"3px 6px",borderRadius:3,border:"1px solid #90CAF9",fontSize:10}}/><button onClick={()=>msSaveCatEdit(i)} style={{padding:"3px 10px",borderRadius:3,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:"#1976D2",color:"#fff"}}>Save</button><button onClick={()=>setMsCatEditIdx(null)} style={{padding:"3px 8px",borderRadius:3,border:"1px solid #999",cursor:"pointer",fontSize:9,fontWeight:700,background:"#fff",color:"#555"}}>Cancel</button></div></div>
                    </div>
                  </div>;
                  return<div key={i} style={{padding:"5px 9px",borderBottom:"1px solid #eee"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontSize:8,fontWeight:700,color:"#fff",background:catColor(m.cat),padding:"1px 5px",borderRadius:3,marginRight:4}}>{m.cat}</span>
                        {m.b&&<span style={{fontSize:9,fontWeight:700,color:"#c00",marginRight:3}}>{m.b}</span>}
                        <span style={{fontSize:11}}>{m.n}</span>
                        {(m.m||m.d)&&<div style={{fontSize:9,color:"#999",marginTop:1}}>{m.m}{m.m&&m.d?" • ":""}{m.d?m.d.substring(0,80):""}</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
                        <span style={{fontWeight:800,fontSize:11}}>{fmt(m.p)}</span>
                        <button onClick={()=>addMatFromCatalog(m)} style={{padding:"2px 7px",borderRadius:4,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:"#1e293b",color:"#fff"}}>+ Add</button>
                        <button onClick={()=>msStartCatEdit(i)} style={{padding:"2px 5px",borderRadius:4,border:"1px solid #1976D2",cursor:"pointer",fontSize:8,fontWeight:700,background:"#fff",color:"#1976D2"}}>Edit</button>
                        <button onClick={()=>msRemoveCatItem(i)} style={{padding:"2px 5px",borderRadius:4,border:"1px solid #c00",cursor:"pointer",fontSize:8,fontWeight:700,background:"#fff",color:"#c00"}}>Remove</button>
                      </div>
                    </div>
                  </div>})}
                </div>
                <div style={{fontSize:10,color:"#888",marginTop:3}}>{msMatList.length} items</div>
              </div>
              <div>
                <h4 style={{margin:"0 0 6px",fontSize:12,fontWeight:700,color:"#1e293b"}}>Quick Add Material</h4>
                <div className="mob-quickadd" style={{display:"flex",gap:6,alignItems:"center",marginBottom:12}}>
                  <input value={addlDesc} onChange={e=>setAddlDesc(e.target.value)} placeholder="Description" style={{flex:1,padding:"6px 8px",borderRadius:5,border:"1px solid #ccc",fontSize:11}}/>
                  <input value={addlPrice} onChange={e=>setAddlPrice(e.target.value)} placeholder="$ Cost" type="number" style={{width:80,padding:"6px 8px",borderRadius:5,border:"1px solid #ccc",fontSize:11}}/>
                  <button onClick={addMaterial} style={{background:"#10b981",color:"#fff",border:"none",padding:"6px 12px",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700}}>+ Add</button>
                </div>
                <h4 style={{margin:"0 0 6px",fontSize:12,fontWeight:700,color:"#1e293b"}}>Materials Added ({addlMaterials.length})</h4>
                {addlMaterials.length===0?<div style={{background:"#f9f9f9",borderRadius:8,padding:14,textAlign:"center",fontSize:11,color:"#aaa"}}>No additional materials yet.</div>:
                <div style={{background:"#f9f9f9",borderRadius:8,border:"1px solid #eee",maxHeight:340,overflowY:"auto"}}>
                  {addlMaterials.map((m,i)=><div key={i} style={{padding:"6px 9px",borderBottom:"1px solid #eee"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{flex:1,minWidth:0}}>
                        {m.cat&&<span style={{fontSize:8,fontWeight:700,color:"#fff",background:"#888",padding:"1px 4px",borderRadius:3,marginRight:4}}>{m.cat}</span>}
                        <span style={{fontSize:11,fontWeight:600}}>{m.desc}</span>
                      </div>
                      <button onClick={()=>removeMaterial(i)} style={{background:"#c00",color:"#fff",border:"none",padding:"2px 6px",borderRadius:3,cursor:"pointer",fontSize:9,fontWeight:700}}>Delete</button>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4}}>
                      <span style={{fontSize:9,color:"#888"}}>Qty:</span>
                      <input value={m.qty||1} onChange={e=>updateMatQty(i,e.target.value)} type="number" min="1" style={{width:40,padding:"2px 4px",borderRadius:3,border:"1px solid #ccc",fontSize:10,textAlign:"center"}}/>
                      <span style={{fontSize:9,color:"#888"}}>× ${fmt(m.price).slice(1)}</span>
                      <span style={{fontSize:9,color:"#888"}}>=</span>
                      <span style={{fontWeight:800,fontSize:12,color:"#1e293b"}}>{fmt(m.price*(m.qty||1))}</span>
                    </div>
                  </div>)}
                </div>}
                {addlMaterials.length>0&&<div style={{marginTop:6,textAlign:"right",fontWeight:800,fontSize:13,color:"#1e293b"}}>Materials Subtotal: {fmt(addlTotal)}</div>}
              </div>
            </div>
          </div>
        </>}

        {/* ╔══════════════════════════════════════════════════════════════╗ */}
        {/* ║  SHARED PROJECT QUOTE                                       ║ */}
        {/* ╚══════════════════════════════════════════════════════════════╝ */}
        <div style={{background:"linear-gradient(135deg,#1e293b,#2563eb)",borderRadius:12,padding:20,color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{margin:0,fontSize:18,fontWeight:800}}>Project Quote</h2>
            {(cart.length>0||addlMaterials.length>0)&&<button onClick={clearCart} style={{background:"#c00",color:"#fff",border:"none",padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700}}>Clear All</button>}
          </div>
          <div className="mob-quote-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <h4 style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:"#60a5fa"}}>Equipment Selected</h4>
              {cart.length===0?<div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:16,textAlign:"center",fontSize:12,color:"#88a"}}>No equipment added yet.</div>:
              <div style={{background:"rgba(255,255,255,.06)",borderRadius:8,overflow:"hidden"}}>
                {cart.map((c,i)=>(
                  <div key={i} style={{padding:"7px 10px",borderBottom:"1px solid rgba(255,255,255,.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <Tag label={c.type} color={c.type==="Outdoor"?"#2563eb":c.type==="Indoor"?"#c00":c.type==="Furnace"?"#c00":c.type==="Evap Coil"?"#8B0000":c.type==="Air Handler"?"#6B3A2A":c.type==="Heat Pump"?"#2563eb":"#2E4053"}/>
                      <Tag label={c._mode==="minisplit"?"MS":"WH"} color={c._mode==="minisplit"?"#1428A0":"#795548"}/>
                      <span style={{fontSize:11,fontWeight:600}}>{c.item.b} {c.item.n}</span>
                      <div style={{fontSize:9,color:"#aab",marginTop:1}}>{c.item.m}{c.info?` • ${c.info}`:""}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontWeight:800,fontSize:12}}>{fmt(c.item.p)}</span>
                      <button onClick={()=>removeFromCart(i)} style={{background:"#c00",color:"#fff",border:"none",padding:"1px 6px",borderRadius:3,cursor:"pointer",fontSize:10,fontWeight:700}}>✕</button>
                    </div>
                  </div>
                ))}
              </div>}
              {addlMaterials.length>0&&<>
                <h4 style={{margin:"14px 0 8px",fontSize:13,fontWeight:700,color:"#60a5fa"}}>Additional Materials ({addlMaterials.length})</h4>
                <div style={{background:"rgba(255,255,255,.06)",borderRadius:8,overflow:"hidden"}}>
                  {addlMaterials.map((m,i)=>(
                    <div key={i} style={{padding:"5px 10px",borderBottom:"1px solid rgba(255,255,255,.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{flex:1}}>{m.cat&&<Tag label={m.cat} color="#555"/>}<span style={{fontSize:11}}>{m.desc}</span>{(m.qty||1)>1&&<span style={{fontSize:9,color:"#aab",marginLeft:4}}>×{m.qty}</span>}</div>
                      <span style={{fontWeight:800,fontSize:11}}>{fmt(m.price*(m.qty||1))}</span>
                    </div>
                  ))}
                </div>
              </>}
            </div>
            <div>
              <h4 style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:"#60a5fa"}}>Price Breakdown</h4>
              <div style={{background:"rgba(255,255,255,.06)",borderRadius:8,padding:14}}>
                {[["Equipment ("+cart.length+" items)",equipTotal],
                  ...(addlMaterials.length>0?[["Additional Materials ("+addlMaterials.length+")",addlTotal]]:[]),
                ].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}}><span>{l}</span><span style={{fontWeight:700}}>{fmt(v)}</span></div>)}
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,borderTop:"1px solid rgba(255,255,255,.15)",marginTop:4,paddingTop:8}}><span>Material Subtotal</span><span style={{fontWeight:700}}>{fmt(materialTotal)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,color:"#f9a"}}><span>Tax (7%)</span><span style={{fontWeight:700}}>{fmt(tax)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}}><span style={{fontWeight:600}}>Material + Tax</span><span style={{fontWeight:700}}>{fmt(materialWithTax)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,color:"#af8"}}><span>Margin (30%)</span><span style={{fontWeight:700}}>{fmt(margin)}</span></div>
                <div style={{borderTop:"1px solid rgba(255,255,255,.15)",marginTop:8,paddingTop:8}}>
                  {[["Labor",labor,setLabor],["Sean Labor",seanLabor,setSeanLabor]].map(([l,v,set],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12}}>
                    <span>{l}</span><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:11,color:"#aab"}}>$</span><input value={v} onChange={e=>set(e.target.value)} type="number" placeholder="0.00" style={{width:90,padding:"4px 6px",borderRadius:4,border:"1px solid #444",background:"rgba(255,255,255,.12)",color:"#fff",fontSize:12,textAlign:"right"}}/></div>
                  </div>)}
                </div>
                <div style={{borderTop:"2px solid #10b981",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:16,fontWeight:800}}>TOTAL PROJECT PRICE</span>
                  <span style={{fontSize:20,fontWeight:900,color:"#10b981"}}>{fmt(grandTotal)}</span>
                </div>
                <div style={{borderTop:"1px solid rgba(255,255,255,.15)",marginTop:10,paddingTop:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12,color:"#ffd54f"}}>
                    <span style={{fontWeight:700}}>Deposit Amount</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:11,color:"#aab"}}>$</span>
                      <input value={deposit} onChange={e=>setDeposit(e.target.value)} type="number" placeholder="0.00" style={{width:90,padding:"4px 6px",borderRadius:4,border:"1px solid #ffd54f",background:"rgba(255,213,79,.12)",color:"#fff",fontSize:12,textAlign:"right"}}/>
                    </div>
                  </div>
                  {depositAmt>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"6px 0 2px",fontSize:13,fontWeight:800,color:"#fff"}}>
                    <span>Balance Due</span><span>{fmt(balanceDue)}</span>
                  </div>}
                </div>
                <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:6}}>
                  <button onClick={generatePDF} style={{width:"100%",padding:"10px",borderRadius:8,border:"2px solid #10b981",cursor:"pointer",fontSize:13,fontWeight:800,background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff"}}>📄 Generate Estimate PDF</button>
                  <button onClick={saveToDrive} disabled={gDriveSaving}
                    style={{width:"100%",padding:"10px",borderRadius:8,border:"2px solid #4285f4",cursor:gDriveSaving?"wait":"pointer",fontSize:13,fontWeight:800,
                      background:gDriveSaving?"#94a3b8":"linear-gradient(135deg,#4285f4,#2563eb)",color:"#fff",transition:"all .2s"}}>
                    {gDriveSaving ? "☁️ Saving..." : "☁️ Save to Google Drive"}
                  </button>
                  {gDriveMsg && (
                    <div style={{padding:"6px 10px",borderRadius:6,fontSize:11,fontWeight:600,textAlign:"center",
                      background:gDriveStatus==="success"?"#d1fae5":gDriveStatus==="error"?"#fee2e2":"#dbeafe",
                      color:gDriveStatus==="success"?"#065f46":gDriveStatus==="error"?"#991b1b":"#1e40af",
                      border:"1px solid "+(gDriveStatus==="success"?"#6ee7b7":gDriveStatus==="error"?"#fca5a5":"#93c5fd")}}>
                      {gDriveMsg}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWrapper />);

</script>
<script>
// Register service worker for PWA / offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker registered:', reg.scope))
      .catch(err => console.warn('Service Worker registration failed:', err));
  });
}
</script>
</body>
</html>
