// ===== WHOLE HOUSE EDIT FORM =====
function EditForm({item,cat,onSave,onCancel}){
  const[f,setF]=useState({...item});
  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const numFld=(label,key,step)=>(
    <div className="edit-field"><label>{label}</label><input type="number" step={step||1} value={f[key]||""} onChange={e=>upd(key,parseFloat(e.target.value)||0)}/></div>
  );
  const txtFld=(label,key)=>(
    <div className="edit-field"><label>{label}</label><input type="text" value={f[key]||""} onChange={e=>upd(key,e.target.value)}/></div>
  );
  return(
    <div style={{padding:"10px 10px 8px",borderBottom:"2px solid #1a1a2e",background:"#fffde7"}}>
      <div style={{fontSize:9,fontWeight:800,color:"#888",marginBottom:6,textTransform:"uppercase",letterSpacing:".5px"}}>
        ✏️ Editing: <span style={{color:"#1a1a2e"}}>{item.n}</span>
      </div>
      <div className="edit-form-grid">
        {txtFld("Name","n")}{txtFld("Model #","m")}{txtFld("Brand","b")}{numFld("Price $","p",0.01)}{numFld("Tonnage","ton",0.5)}
        {f.seer!==undefined&&numFld("SEER","seer",0.1)}
        {f.btu!==undefined&&numFld("BTU (k)","btu",5)}
        {f.afue!==undefined&&numFld("AFUE %","afue",1)}
        {f.stg!==undefined&&numFld("Stages","stg",1)}
        {f.cab!==undefined&&txtFld("Cabinet","cab")}
        {f.w!==undefined&&txtFld("Width","w")}
        {f.v!==undefined&&txtFld("Voltage","v")}
      </div>
      <div style={{display:"flex",gap:5,justifyContent:"flex-end"}}>
        <button onClick={()=>onSave(f,cat)} style={{background:"#4caf50",color:"#fff",border:"none",padding:"4px 12px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700}}>✓ Save</button>
        <button onClick={onCancel} style={{background:"#888",color:"#fff",border:"none",padding:"4px 12px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700}}>✕ Cancel</button>
      </div>
    </div>
  );
}

// ===== WHOLE HOUSE EQUIPMENT ROW =====
function EqRow({item,sel,onClick,info,type,typeInfo,cat,editingModel,onStartEdit,onSaveEdit,onCancelEdit,onRemove,addToCart,inCart}){
  if(editingModel===item.m) return <EditForm item={item} cat={cat} onSave={onSaveEdit} onCancel={onCancelEdit}/>;
  const added=inCart(item.m);
  return(
    <div onClick={onClick} style={{padding:"6px 9px",borderBottom:"1px solid #eee",cursor:onClick?"pointer":"default",background:sel?"#1a1a2e":"#fff",color:sel?"#fff":"#333",display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
      <div style={{flex:1,minWidth:0}}>
        {typeInfo&&<Tag label={typeInfo.label} color={typeInfo.color}/>}
        <span style={{fontWeight:700,fontSize:10,color:sel?"#8af":bColor(item.b),marginRight:3}}>{item.b}</span>
        <span style={{fontSize:11}}>{item.n}</span>
        <div style={{fontSize:9,marginTop:1,opacity:.6}}>{item.m}{info?` • ${info}`:""}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
        <span style={{fontWeight:800,fontSize:11,whiteSpace:"nowrap"}}>{fmt(item.p)}</span>
        {addToCart&&<button onClick={e=>{e.stopPropagation();if(!added)addToCart(type,item,info)}} style={{padding:"2px 7px",borderRadius:4,border:"none",cursor:added?"default":"pointer",fontSize:9,fontWeight:700,background:added?"#4caf50":"#1a1a2e",color:"#fff",opacity:added?.75:1,whiteSpace:"nowrap"}}>{added?"✓":"+ Add"}</button>}
        <button onClick={e=>{e.stopPropagation();onStartEdit(item,cat)}} title="Edit" style={{padding:"2px 6px",borderRadius:4,border:"1px solid #bbb",cursor:"pointer",fontSize:10,background:sel?"rgba(255,255,255,.15)":"#f5f5f5",color:sel?"#fff":"#555",lineHeight:1.2}}>✏️</button>
        <button onClick={e=>{e.stopPropagation();onRemove(item.m,cat)}} title="Remove" style={{padding:"2px 6px",borderRadius:4,border:"1px solid #fcc",cursor:"pointer",fontSize:10,background:"#fff0f0",color:"#c00",lineHeight:1.2}}>🗑</button>
      </div>
    </div>
  );
}

// ===== COIL ROW =====
function CoilRow({c,selF,cat,editingModel,onStartEdit,onSaveEdit,onCancelEdit,onRemove,addToCart,inCart}){
  if(editingModel===c.m) return <EditForm item={c} cat={cat} onSave={onSaveEdit} onCancel={onCancelEdit}/>;
  const exact=c.ton===selF.ton&&c.w===selF.w;
  const added=inCart(c.m);
  return(
    <div style={{padding:"6px 9px",borderBottom:"1px solid #eee",background:exact?"#f0f7ff":"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
      <div style={{flex:1}}>
        <span style={{fontWeight:700,fontSize:10,color:bColor(c.b),marginRight:3}}>{c.b}</span>
        <span style={{fontSize:11,fontWeight:600}}>{c.n}</span>
        {exact&&<span style={{marginLeft:4,background:"#4caf50",color:"#fff",fontSize:8,padding:"1px 4px",borderRadius:3,fontWeight:800}}>EXACT</span>}
        <div style={{fontSize:9,color:"#666",marginTop:1}}>{c.m} • {c.ton}T • {c.w}" (Cab {wToCab(c.w)})</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
        <span style={{fontWeight:800,fontSize:11}}>{fmt(c.p)}</span>
        <button onClick={e=>{e.stopPropagation();if(!added)addToCart("Evap Coil",c,`${c.ton}T ${c.w}"`)}} style={{padding:"2px 7px",borderRadius:4,border:"none",cursor:added?"default":"pointer",fontSize:9,fontWeight:700,background:added?"#4caf50":"#1a1a2e",color:"#fff",opacity:added?.75:1}}>{added?"✓":"+ Add"}</button>
        <button onClick={()=>onStartEdit(c,cat)} title="Edit" style={{padding:"2px 6px",borderRadius:4,border:"1px solid #bbb",cursor:"pointer",fontSize:10,background:"#f5f5f5",color:"#555"}}>✏️</button>
        <button onClick={()=>onRemove(c.m,cat)} title="Remove" style={{padding:"2px 6px",borderRadius:4,border:"1px solid #fcc",cursor:"pointer",fontSize:10,background:"#fff0f0",color:"#c00"}}>🗑</button>
      </div>
    </div>
  );
}

// ===== WH RESTORE PANEL =====
function WhRestorePanel({removedItems,onRestore}){
  if(!removedItems.length) return null;
  const grouped={};
  removedItems.forEach(i=>{if(!grouped[i._cat])grouped[i._cat]=[];grouped[i._cat].push(i)});
  return(
    <div style={{marginTop:10,background:"#fff8e1",border:"2px solid #f59e0b",borderRadius:10,padding:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <span style={{fontSize:14}}>🗑️</span>
        <span style={{fontWeight:800,fontSize:13,color:"#92400e"}}>Removed Items — Click Restore to bring back</span>
        <span style={{background:"#f59e0b",color:"#fff",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700,marginLeft:"auto"}}>{removedItems.length} removed</span>
      </div>
      {Object.entries(grouped).map(([cat,items])=>(
        <div key={cat} style={{marginBottom:8}}>
          <div style={{fontSize:10,fontWeight:800,color:"#92400e",marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>{CAT_LABELS[cat]||cat}</div>
          {items.map((item,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#fffbeb",borderRadius:5,marginBottom:3,border:"1px solid #fde68a"}}>
              <div>
                <span style={{fontWeight:700,fontSize:10,color:bColor(item.b),marginRight:3}}>{item.b}</span>
                <span style={{fontSize:11}}>{item.n}</span>
                <span style={{fontSize:9,color:"#888",marginLeft:6}}>{item.m}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:700,fontSize:11}}>{fmt(item.p)}</span>
                <button onClick={()=>onRestore(item.m)} style={{background:"#4caf50",color:"#fff",border:"none",padding:"3px 10px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700}}>↩ Restore</button>
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=mode==="minisplit"?"MiniSplit_Database.xlsx":"FW_Webb_HVAC_Database.xlsx";a.click();URL.revokeObjectURL(url);
  };

  // ===== MS INLINE EDIT FORM (plain function call to avoid focus loss) =====
  const MsEqEditForm=({type,item})=><div style={{padding:"8px 9px",borderBottom:"1px solid #eee",background:"#fffde7",border:"2px solid #f59e0b"}}>
    <div style={{fontSize:9,fontWeight:800,color:"#888",marginBottom:6,textTransform:"uppercase"}}>✏️ Editing: <span style={{color:"#1a1a2e"}}>{item.n}</span></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Name</label><input value={msEqEditForm.n} onChange={e=>setMsEqEditForm(p=>({...p,n:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>
      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Part / Model #</label><input value={msEqEditForm.m} onChange={e=>setMsEqEditForm(p=>({...p,m:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>
      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Brand</label><input value={msEqEditForm.b} onChange={e=>setMsEqEditForm(p=>({...p,b:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>
      <div><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Cost $</label><input value={msEqEditForm.p} onChange={e=>setMsEqEditForm(p=>({...p,p:e.target.value}))} type="number" step="0.01" style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>
      <div style={{gridColumn:"1/3"}}><label style={{fontSize:8,fontWeight:700,color:"#555"}}>Description</label><input value={msEqEditForm.d} onChange={e=>setMsEqEditForm(p=>({...p,d:e.target.value}))} style={{width:"100%",padding:"3px 6px",borderRadius:3,border:"1px solid #f59e0b",fontSize:10,boxSizing:"border-box"}}/></div>
    </div>
    <div style={{display:"flex",gap:4,marginTop:4}}>
      <button onClick={()=>msSaveEqEdit(type,item)} style={{padding:"3px 10px",borderRadius:3,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:"#4caf50",color:"#fff"}}>✓ Save</button>
      <button onClick={msCancelEqEdit} style={{padding:"3px 8px",borderRadius:3,border:"1px solid #999",cursor:"pointer",fontSize:9,fontWeight:700,background:"#fff",color:"#555"}}>✕ Cancel</button>
      <button onClick={()=>msRemoveEqItem(type,item)} style={{padding:"3px 8px",borderRadius:3,border:"1px solid #c00",cursor:"pointer",fontSize:9,fontWeight:700,background:"#fff",color:"#c00",marginLeft:"auto"}}>🗑 Remove from DB</button>
    </div>
  </div>;

  const MsAddEqForm=({type})=><div style={{background:"#e8f5e9",borderRadius:6,padding:8,marginBottom:6,border:"1px solid #c8e6c9"}}>
    <div style={{fontSize:10,fontWeight:700,color:"#2E7D32",marginBottom:4}}>Add {type==="outdoor"?"Outdoor":"Indoor"} Unit to Database</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
      <input value={msNewEq.n} onChange={e=>setMsNewEq(p=>({...p,n:e.target.value}))} placeholder="Name *" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}/>
      <input value={msNewEq.m} onChange={e=>setMsNewEq(p=>({...p,m:e.target.value}))} placeholder="Part / Model #" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}/>
      <input value={msNewEq.b} onChange={e=>setMsNewEq(p=>({...p,b:e.target.value}))} placeholder="Brand" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}/>
      <input value={msNewEq.p} onChange={e=>setMsNewEq(p=>({...p,p:e.target.value}))} placeholder="Price" type="number" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10}}/>
      <input value={msNewEq.d} onChange={e=>setMsNewEq(p=>({...p,d:e.target.value}))} placeholder="Description" style={{padding:"4px 6px",borderRadius:3,border:"1px solid #ccc",fontSize:10,gridColumn:"1/3"}}/>
    </div>
    <div style={{display:"flex",gap:4,marginTop:4}}><button onClick={()=>msAddEquip(type)} style={{padding:"3px 12px",borderRadius:3,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:"#2E7D32",color:"#fff"}}>Save</button><button onClick={()=>setMsShowAddEq(null)} style={{padding:"3px 12px",borderRadius:3,border:"1px solid #999",cursor:"pointer",fontSize:9,fontWeight:700,background:"#fff",color:"#555"}}>Cancel</button></div>
  </div>;

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  RENDER                                                      ║
  // ╚══════════════════════════════════════════════════════════════╝
  return(
    <div style={{fontFamily:"'Segoe UI',system-ui,sans-serif",background:"#f4f5f7",minHeight:"100vh",padding:10}}>
      <div style={{maxWidth:1440,margin:"0 auto"}}>

        {/* ====== HEADER ====== */}
        <div style={{background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",borderRadius:12,padding:"16px 22px",marginBottom:12,color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,marginBottom:12}}>
            <div>
              <h1 style={{margin:0,fontSize:20,fontWeight:800}}>Cold Breeze LLC — HVAC System Builder</h1>
              <p style={{margin:"3px 0 0",opacity:.6,fontSize:12}}>Sales & Quoting Tool • {mode==="minisplit"?`Samsung Mini Split • ${msTotal} units • ${msMatData.length} materials`:`FW Webb Account #221678 • Rheem, Bosch, GE • ${whTotalItems} active items`}{cart.length>0?` • ${cart.length} in cart`:""}</p>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <button onClick={exportXLSX} style={{padding:"6px 14px",borderRadius:7,border:"1px solid rgba(255,255,255,.4)",cursor:"pointer",fontSize:11,fontWeight:700,background:"rgba(255,255,255,.15)",color:"#fff"}}>📥 Export Database XLSX</button>
            </div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700,opacity:.7}}>SYSTEM TYPE:</span>
            <BigBtn v="minisplit" cur={mode} onClick={()=>setMode("minisplit")} color="#1428A0">❄️ Mini Split</BigBtn>
            <BigBtn v="wholehouse" cur={mode} onClick={()=>setMode("wholehouse")} color="#c00">🏠 Whole House System</BigBtn>
          </div>
        </div>

        {/* TIP BAR */}
        <div style={{background:"#e8f4fd",borderRadius:7,padding:"6px 12px",marginBottom:10,fontSize:10,color:"#1a1a2e",display:"flex",gap:10,alignItems:"center"}}>
          <span>💡</span><span><strong>✏️ Edit</strong> any item inline. <strong>🗑 Remove</strong> hides from database. Use <strong>↩ Restore</strong> to undo. Cart is shared across both modes.</span>
        </div>

        {/* ╔══════════════════════════════════════════════════════════════╗ */}
        {/* ║  MINI SPLIT MODE                                            ║ */}
        {/* ╚══════════════════════════════════════════════════════════════╝ */}
        {mode==="minisplit"&&<>
          {/* MS Restore Panel */}
          {msTotalRemoved>0&&<button onClick={()=>setMsShowRemoved(p=>!p)} style={{padding:"5px 14px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:800,background:"#f59e0b",color:"#fff",marginBottom:8}}>{msShowRemoved?"▲ Hide":"▼ Show"} Removed ({msTotalRemoved})</button>}
          {msShowRemoved&&msTotalRemoved>0&&<div style={{background:"#fff8e1",border:"2px solid #f59e0b",borderRadius:10,padding:14,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{fontSize:14}}>🗑️</span>
              <span style={{fontWeight:800,fontSize:13,color:"#92400e"}}>Removed Items</span>
              <span style={{background:"#f59e0b",color:"#fff",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700,marginLeft:"auto"}}>{msTotalRemoved}</span>
            </div>
            {msRemovedOut.length>0&&<div style={{marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:800,color:"#92400e",marginBottom:4,textTransform:"uppercase"}}>Outdoor Units</div>
              {msRemovedOut.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#fffbeb",borderRadius:5,marginBottom:3,border:"1px solid #fde68a"}}>
                <div><span style={{fontWeight:700,fontSize:10,color:"#0f3460",marginRight:4}}>{item.b}</span><span style={{fontSize:11}}>{item.n}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:700,fontSize:11}}>{fmt(item.p)}</span><button onClick={()=>msRestoreOut(msEqKey(item))} style={{background:"#4caf50",color:"#fff",border:"none",padding:"3px 10px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700}}>↩ Restore</button></div>
              </div>)}
            </div>}
            {msRemovedIn.length>0&&<div style={{marginBottom:8}}>
              <div style={{fontSize:10,fontWeight:800,color:"#92400e",marginBottom:4,textTransform:"uppercase"}}>Indoor Units</div>
              {msRemovedIn.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#fffbeb",borderRadius:5,marginBottom:3,border:"1px solid #fde68a"}}>
                <div><span style={{fontWeight:700,fontSize:10,color:"#c00",marginRight:4}}>{item.b}</span><span style={{fontSize:11}}>{item.n}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:700,fontSize:11}}>{fmt(item.p)}</span><button onClick={()=>msRestoreIn(msEqKey(item))} style={{background:"#4caf50",color:"#fff",border:"none",padding:"3px 10px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700}}>↩ Restore</button></div>
              </div>)}
            </div>}
            {msRemovedMat.length>0&&<div>
              <div style={{fontSize:10,fontWeight:800,color:"#92400e",marginBottom:4,textTransform:"uppercase"}}>Materials</div>
              {msRemovedMat.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#fffbeb",borderRadius:5,marginBottom:3,border:"1px solid #fde68a"}}>
                <div><span style={{fontSize:8,fontWeight:700,color:"#fff",background:catColor(item.cat),padding:"1px 5px",borderRadius:3,marginRight:4}}>{item.cat}</span><span style={{fontSize:11}}>{item.n}</span></div>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontWeight:700,fontSize:11}}>{fmt(item.p)}</span><button onClick={()=>msRestoreMat(i)} style={{background:"#4caf50",color:"#fff",border:"none",padding:"3px 10px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700}}>↩ Restore</button></div>
              </div>)}
            </div>}
          </div>}

          {/* MS System Type */}
          <div style={{background:"#fff",borderRadius:10,padding:"10px 14px",marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,.08)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontWeight:800,fontSize:13,color:"#1a1a2e"}}>MINI SPLIT TYPE:</span>
            <button onClick={()=>{setMsSysType("Single");setMsSelOut(null);setMsSelIn(null);setMsOutSearch("");setMsInSearch("");setMsFjmIndoor([]);setMsEditKey(null)}} style={{padding:"6px 16px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:msSysType==="Single"?"#1a1a2e":"#e8e8ee",color:msSysType==="Single"?"#fff":"#555"}}>Single Zone (RAC)</button>
            <button onClick={()=>{setMsSysType("FJM");setMsSelOut(null);setMsSelIn(null);setMsOutSearch("");setMsInSearch("");setMsFjmIndoor([]);setMsEditKey(null)}} style={{padding:"6px 16px",borderRadius:6,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:msSysType==="FJM"?"#1a1a2e":"#e8e8ee",color:msSysType==="FJM"?"#fff":"#555"}}>Multi-Zone (FJM)</button>
            <span style={{marginLeft:8,fontSize:11,color:"#888"}}>{msSysType==="Single"?"1 outdoor + 1 indoor":"1 outdoor + multiple indoor heads"}</span>
          </div>

          {/* MS Customer Info */}
          <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div>
                <h3 style={{margin:"0 0 10px",fontSize:14,fontWeight:800,color:"#1a1a2e"}}>Customer Information</h3>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{gridColumn:"1/3"}}><label style={{fontSize:10,fontWeight:700,color:"#888"}}>System Title</label><input value={estTitle} onChange={e=>setEstTitle(e.target.value)} style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div style={{gridColumn:"1/3"}}><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Client Name</label><input value={estClient.name} onChange={e=>setEstClient(p=>({...p,name:e.target.value}))} placeholder="Client full name" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Billing Address</label><input value={estClient.addr1} onChange={e=>setEstClient(p=>({...p,addr1:e.target.value}))} placeholder="Street address" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Service Address</label><input value={estClient.svcAddr1} onChange={e=>setEstClient(p=>({...p,svcAddr1:e.target.value}))} placeholder="Street (if different)" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Billing City/State/ZIP</label><input value={estClient.addr2} onChange={e=>setEstClient(p=>({...p,addr2:e.target.value}))} placeholder="City, State ZIP" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                  <div><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Service City/State/ZIP</label><input value={estClient.svcAddr2} onChange={e=>setEstClient(p=>({...p,svcAddr2:e.target.value}))} placeholder="City, State ZIP" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                </div>
              </div>
              <div>
                <h3 style={{margin:"0 0 10px",fontSize:14,fontWeight:800,color:"#1a1a2e"}}>Notes & Scope of Work</h3>
                <textarea value={estNotes} onChange={e=>setEstNotes(e.target.value)} rows={4} placeholder="Scope of work..." style={{width:"100%",padding:"10px",borderRadius:5,border:"1px solid #ddd",fontSize:11,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",marginBottom:10}}/>
                <h3 style={{margin:"0 0 8px",fontSize:14,fontWeight:800,color:"#1a1a2e"}}>Description of Service</h3>
                <textarea value={estDesc} onChange={e=>setEstDesc(e.target.value)} rows={3} placeholder="Line items for estimate..." style={{width:"100%",padding:"10px",borderRadius:5,border:"1px solid #ddd",fontSize:11,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box"}}/>
                <h3 style={{margin:"10px 0 8px",fontSize:14,fontWeight:800,color:"#1a1a2e"}}>Terms & Conditions</h3>
                <textarea value={estTerms} onChange={e=>setEstTerms(e.target.value)} rows={4} style={{width:"100%",padding:"10px",borderRadius:5,border:"1px solid #ddd",fontSize:10,fontFamily:"inherit",resize:"vertical",boxSizing:"border-box",color:"#555"}}/>
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <div style={{flex:1}}><label style={{fontSize:10,fontWeight:700,color:"#888"}}>Total Amount (override)</label><input value={estTotal} onChange={e=>setEstTotal(e.target.value)} placeholder={fmt(grandTotal)+" (auto)"} type="number" step="0.01" style={{width:"100%",padding:"6px 10px",borderRadius:5,border:"1px solid #ddd",fontSize:12,boxSizing:"border-box"}}/></div>
                </div>
              </div>
            </div>
          </div>

          {/* MS Equipment Selection - FJM or Single Zone */}
          {msSysType==="FJM"?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            {/* FJM Indoor */}
            <div>
              <h3 style={{margin:"0 0 6px",fontSize:13,fontWeight:800,color:"#c00",display:"flex",justifyContent:"space-between",alignItems:"center"}}>1. Select FJM Indoor Units<button onClick={()=>setMsShowAddEq(msShowAddEq==="indoor"?null:"indoor")} style={{padding:"2px 8px",borderRadius:4,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:msShowAddEq==="indoor"?"#c00":"#4caf50",color:"#fff"}}>{msShowAddEq==="indoor"?"Cancel":"+ Add"}</button></h3>
              {msShowAddEq==="indoor"&&<MsAddEqForm type="indoor"/>}
              {fjmZones>0&&<div style={{background:"#e3f2fd",borderRadius:6,padding:8,marginBottom:6,fontSize:11}}>
                <strong>{fjmZones} indoor unit{fjmZones>1?"s":""}</strong> — Total: <strong>{fjmBtu}k BTU</strong>
                <div style={{fontSize:9,color:"#555",marginTop:2}}>Outdoor needs: min {fjmZones} ports, min {fjmBtu}k BTU</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                  {msFjmIndoor.map(u=><span key={u._id} style={{display:"inline-flex",alignItems:"center",gap:3,background:"#fff",border:"1px solid #90CAF9",borderRadius:4,padding:"2px 6px",fontSize:9}}>
                    <span style={{fontWeight:600}}>{u.btu}k</span><span style={{color:"#888"}}>{u.n.substring(0,25)}</span>
                    <button onClick={()=>removeFjmIndoor(u._id)} style={{background:"#c00",color:"#fff",border:"none",borderRadius:2,cursor:"pointer",fontSize:8,fontWeight:700,padding:"0 3px",lineHeight:"14px"}}>×</button>
                  </span>)}
                </div>
                <button onClick={()=>setMsFjmIndoor([])} style={{marginTop:6,padding:"2px 8px",borderRadius:3,border:"1px solid #c00",cursor:"pointer",fontSize:8,fontWeight:700,background:"#fff",color:"#c00"}}>Clear All</button>
                <button onClick={()=>{msFjmIndoor.forEach(u=>addToCartMS("Indoor",u))}} style={{marginTop:6,marginLeft:6,padding:"2px 8px",borderRadius:3,border:"none",cursor:"pointer",fontSize:8,fontWeight:700,background:"#4caf50",color:"#fff"}}>Add All to Quote</button>
              </div>}
              <SearchBox val={msInSearch} set={setMsInSearch} ph="Search indoor units..."/>
              <div style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 2px rgba(0,0,0,.08)",maxHeight:440,overflowY:"auto"}}>
                {msInList.length===0?<div style={{padding:16,textAlign:"center",color:"#aaa",fontSize:11}}>No indoor units match.</div>:
                msInList.map((item,i)=>{
                  const k="indoor|"+msEqKey(item);
                  if(msEditKey===k)return <MsEqEditForm key={k} type="indoor" item={item}/>;
                  const cnt=fjmCountOf(item);
                  return<div key={k} style={{padding:"6px 9px",borderBottom:"1px solid #eee",background:cnt>0?"#e8f5e9":"#fff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:4}}>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontWeight:700,fontSize:10,color:"#c00",marginRight:3}}>{item.b}</span>
                        <span style={{fontSize:11}}>{item.n}</span>
                        {item.btu>0&&<Tag label={item.btu+"k BTU"} color="#607D8B"/>}
                        {cnt>0&&<span style={{marginLeft:4,background:"#4caf50",color:"#fff",fontSize:8,padding:"1px 4px",borderRadius:3,fontWeight:800}}>{"×"+cnt}</span>}
                        {item.m&&<div style={{fontSize:8,color:"#999",marginTop:1}}>{item.m}</div>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
                        <span style={{fontWeight:800,fontSize:11}}>{fmt(item.p)}</span>
                        <button onClick={()=>addFjmIndoor(item)} style={{padding:"2px 7px",borderRadius:4,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:"#1a1a2e",color:"#fff"}}>+ Zone</button>
                        <button onClick={()=>msStartEqEdit("indoor",item)} style={{padding:"2px 5px",borderRadius:4,border:"1px solid #bbb",cursor:"pointer",fontSize:8,background:"#f5f5f5",color:"#555"}}>✏️</button>
                        <button onClick={()=>msRemoveEqItem("indoor",item)} style={{padding:"2px 5px",borderRadius:4,border:"1px solid #fcc",cursor:"pointer",fontSize:8,background:"#fff0f0",color:"#c00"}}>🗑</button>
                      </div>
                    </div>
                  </div>})}
              </div>
            </div>
            {/* FJM Outdoor */}
            <div>
              <h3 style={{margin:"0 0 6px",fontSize:13,fontWeight:800,color:"#0f3460",display:"flex",justifyContent:"space-between",alignItems:"center"}}>2. Select Outdoor Unit<button onClick={()=>setMsShowAddEq(msShowAddEq==="outdoor"?null:"outdoor")} style={{padding:"2px 8px",borderRadius:4,border:"none",cursor:"pointer",fontSize:9,fontWeight:700,background:msShowAddEq==="outdoor"?"#c00":"#4caf50",color:"#fff"}}>{msShowAddEq==="outdoor"?"Cancel":"+ Add"}</button></h3>
              {msShowAddEq==="outdoor"&&<MsAddEqForm type="outdoor"/>}
              {fjmZones>0&&<div style={{background:"#e8f5e9",borderRadius:6,padding:7,marginBottom:6,fontSize:10,color:"#1a1a2e"}}><strong>Showing outdoor units with ≥{fjmZones} ports and ≥{fjmBtu}k BTU</strong></div>}
              <SearchBox val={msOutSearch} set={setMsOutSearch} ph="Search outdoor units..."/>
              <div style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 2px rgba(0,0,0,.08)",maxHeight:440,overflowY:"auto"}}>
                {msOutList.length===0?<div style={{padding:16,textAlign:"center",color:"#aaa",fontSize:11}}>No outdoor units match.</div>:
                msOutList.map((item,i)=>{

              {/* 2. Evap Coil */}
              <div>
                <h3 style={{margin:"0 0 6px",fontSize:13,fontWeight:800,color:"#8B0000"}}>2. Evaporator Coil</h3>
                {whSelF?<>
                  <div style={{background:"#e8f5e9",borderRadius:6,padding:7,marginBottom:6,fontSize:10}}>
                    <strong>{whSelF.b} {whSelF.n}</strong> — {fmt(whSelF.p)}<br/>
                    <span style={{color:"#555"}}>{whSelF.ton}T • Cab {whSelF.cab} ({cabW(whSelF.cab)})</span>
                  </div>
                  <div style={{marginBottom:6}}>
                    <F label="Coil Brand">{["All","Rheem","Bosch"].map(v=><Btn key={v} v={v} cur={whCBrand} onClick={()=>setWhCBrand(v)}>{v}</Btn>)}</F>
                  </div>
                  <div style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 2px rgba(0,0,0,.08)",maxHeight:340,overflowY:"auto"}}>
                    {whCoilList.map(c=>(
                      <CoilRow key={c.m} c={c} selF={whSelF} cat="COILS"
                        editingModel={whEditingModel} onStartEdit={whStartEdit} onSaveEdit={whSaveEdit} onCancelEdit={whCancelEdit}
                        onRemove={whRemoveFromDb} addToCart={addToCartWH} inCart={inCartWH}/>
                    ))}
                  </div>
                </>:<Placeholder text="Select a furnace to see coils"/>}
              </div>
              {/* 3. Outdoor */}
              <div>
                <h3 style={{margin:"0 0 6px",fontSize:13,fontWeight:800,color:"#0f3460"}}>3. Outdoor Unit</h3>
                <div style={{background:"#fff",borderRadius:8,padding:8,marginBottom:6,boxShadow:"0 1px 2px rgba(0,0,0,.06)"}}>
                  <F label="Type">
                    <Btn v="ac" cur={whFOutType} onClick={()=>{setWhFOutType("ac");setWhFOutBrand("All");setWhEditingModel(null)}}>AC Condenser</Btn>
                    <Btn v="heatpump" cur={whFOutType} onClick={()=>{setWhFOutType("heatpump");setWhFOutBrand("All");setWhEditingModel(null)}}>Heat Pump (Dual Fuel)</Btn>
                  </F>
                  <F label="Brand">
                    {(whFOutType==="ac"?["All","GE"]:["All","Rheem","Bosch"]).map(v=><Btn key={v} v={v} cur={whFOutBrand} onClick={()=>setWhFOutBrand(v)}>{v}</Btn>)}
                  </F>
                </div>
                <div style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 2px rgba(0,0,0,.08)",maxHeight:370,overflowY:"auto"}}>
                  {whFOutList.length===0?<div style={{padding:16,textAlign:"center",color:"#aaa",fontSize:11}}>No items match.</div>:
                  whFOutList.map(item=>(
                    <EqRow key={item.m} item={item} sel={false}
                      type={whFOutType==="ac"?"AC Condenser":"Heat Pump"}
                      typeInfo={{label:whFOutType==="ac"?"AC":"HP",color:whFOutType==="ac"?"#2E4053":"#0f3460"}}
                      info={`${item.ton}T • ${item.seer} SEER • ${item.stg}-Stg`}
                      cat={whFOutType==="ac"?"AC_CONDENSERS":"HEAT_PUMPS"}
                      {...whEqProps}/>
                  ))}
                </div>
              </div>
            </div>
          ):(
          /* Air Handler Mode */
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div>
              <h3 style={{margin:"0 0 6px",fontSize:13,fontWeight:800,color:"#6B3A2A"}}>1. Air Handler (Indoor)</h3>
              <div style={{background:"#fff",borderRadius:8,padding:8,marginBottom:6,boxShadow:"0 1px 2px rgba(0,0,0,.06)"}}>
                <F label="Brand">{["All","Rheem","Bosch","GE"].map(v=><Btn key={v} v={v} cur={whABrand} onClick={()=>setWhABrand(v)}>{v}</Btn>)}</F>
                <F label="Tonnage"><Btn v="All" cur={whATon} onClick={()=>setWhATon("All")}>All</Btn>{whATons.map(t=><Btn key={t} v={String(t)} cur={whATon} onClick={()=>setWhATon(String(t))}>{t}T</Btn>)}</F>
                <F label="Voltage"><Btn v="All" cur={whAVolt} onClick={()=>setWhAVolt("All")}>All</Btn>{["115","208/230","220"].map(v=><Btn key={v} v={v} cur={whAVolt} onClick={()=>setWhAVolt(v)}>{v}V</Btn>)}</F>
                <F label="Stages"><Btn v="All" cur={whAStg} onClick={()=>setWhAStg("All")}>All</Btn><Btn v="1" cur={whAStg} onClick={()=>setWhAStg("1")}>1-Stg</Btn><Btn v="2" cur={whAStg} onClick={()=>setWhAStg("2")}>2-Stg</Btn></F>
              </div>
              <div style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 2px rgba(0,0,0,.08)",maxHeight:420,overflowY:"auto"}}>
                {whAList.map(item=>(
                  <EqRow key={item.m} item={item} sel={whSelA&&whSelA.m===item.m} onClick={()=>setWhSelA(item)}
                    type="Air Handler" info={`${item.ton}T • ${item.btu}K • ${item.v}V • ${item.stg}-Stg`}
                    cat="AIR_HANDLERS" {...whEqProps}/>
                ))}
              </div>
            </div>
            <div>
              <h3 style={{margin:"0 0 6px",fontSize:13,fontWeight:800,color:"#0f3460"}}>2. Outdoor Unit</h3>
              <div style={{background:"#fff",borderRadius:8,padding:8,marginBottom:6,boxShadow:"0 1px 2px rgba(0,0,0,.06)"}}>
                <F label="Type">
                  <Btn v="heatpump" cur={whAOutType} onClick={()=>{setWhAOutType("heatpump");setWhAOutBrand("All");setWhEditingModel(null)}}>Heat Pump</Btn>
                  <Btn v="ac" cur={whAOutType} onClick={()=>{setWhAOutType("ac");setWhAOutBrand("All");setWhEditingModel(null)}}>AC Condenser</Btn>
                </F>
                <F label="Brand">
                  {(whAOutType==="ac"?["All","GE"]:["All","Rheem","Bosch"]).map(v=><Btn key={v} v={v} cur={whAOutBrand} onClick={()=>setWhAOutBrand(v)}>{v}</Btn>)}
                </F>
              </div>
              {whSelA?<>
                <div style={{background:"#e8f5e9",borderRadius:6,padding:7,marginBottom:6,fontSize:10}}>
                  <strong>{whSelA.b} {whSelA.n}</strong> — {fmt(whSelA.p)}<br/>
                  <span style={{color:"#555"}}>{whSelA.ton}T • {whSelA.v}V</span>
                </div>
                <div style={{background:"#fff",borderRadius:8,boxShadow:"0 1px 2px rgba(0,0,0,.08)",maxHeight:420,overflowY:"auto"}}>
                  {whAOutList.length===0?<div style={{padding:16,textAlign:"center",color:"#aaa",fontSize:11}}>No items match.</div>:
                  whAOutList.map(item=>(
                    <EqRow key={item.m} item={item} sel={false}
                      type={whAOutType==="ac"?"AC Condenser":"Heat Pump"}
                      typeInfo={{label:whAOutType==="ac"?"AC":"HP",color:whAOutType==="ac"?"#2E4053":"#0f3460"}}
                      info={`${item.ton}T • ${item.seer} SEER • ${item.stg}-Stg`}
                      cat={whAOutType==="ac"?"AC_CONDENSERS":"HEAT_PUMPS"}
                      {...whEqProps}/>
                  ))}
                </div>
              </>:<Placeholder text="Select an air handler to see outdoor units"/>}
            </div>
          </div>
          )}

          {/* WH Quick Add Materials (in wholehouse mode) */}
          <div style={{background:"#fff",borderRadius:10,padding:16,marginBottom:12,boxShadow:"0 1px 3px rgba(0,0,0,.08)"}}>
            <h3 style={{margin:"0 0 10px",fontSize:14,fontWeight:800,color:"#1a1a2e"}}>Additional Materials</h3>
            {addlMaterials.length>0&&<div style={{background:"#fafafa",borderRadius:8,border:"1px solid #eee",marginBottom:8,maxHeight:200,overflowY:"auto"}}>
              {addlMaterials.map((m,i)=><div key={i} style={{padding:"5px 10px",borderBottom:"1px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11}}>{m.desc}</span>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:800,fontSize:11}}>{fmt(m.price*(m.qty||1))}</span>
                  <button onClick={()=>removeMaterial(i)} style={{background:"#c00",color:"#fff",border:"none",padding:"1px 6px",borderRadius:3,cursor:"pointer",fontSize:10,fontWeight:700}}>✕</button>
                </div>
              </div>)}
            </div>}
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input value={addlDesc} onChange={e=>setAddlDesc(e.target.value)} placeholder="Item description" style={{flex:1,padding:"6px 8px",borderRadius:5,border:"1px solid #ccc",fontSize:11}}/>
              <input value={addlPrice} onChange={e=>setAddlPrice(e.target.value)} placeholder="$ Price" type="number" style={{width:80,padding:"6px 8px",borderRadius:5,border:"1px solid #ccc",fontSize:11}}/>
              <button onClick={addMaterial} style={{background:"#4caf50",color:"#fff",border:"none",padding:"6px 12px",borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700}}>+ Add</button>
            </div>
          </div>
        </>}

        {/* ╔══════════════════════════════════════════════════════════════╗ */}
        {/* ║  SHARED PROJECT QUOTE                                       ║ */}
        {/* ╚══════════════════════════════════════════════════════════════╝ */}
        <div style={{background:"linear-gradient(135deg,#1a1a2e,#0f3460)",borderRadius:12,padding:20,color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <h2 style={{margin:0,fontSize:18,fontWeight:800}}>Project Quote</h2>
            {(cart.length>0||addlMaterials.length>0)&&<button onClick={clearCart} style={{background:"#c00",color:"#fff",border:"none",padding:"5px 14px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:700}}>Clear All</button>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <h4 style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:"#8af"}}>Equipment Selected</h4>
              {cart.length===0?<div style={{background:"rgba(255,255,255,.08)",borderRadius:8,padding:16,textAlign:"center",fontSize:12,color:"#88a"}}>No equipment added yet.</div>:
              <div style={{background:"rgba(255,255,255,.06)",borderRadius:8,overflow:"hidden"}}>
                {cart.map((c,i)=>(
                  <div key={i} style={{padding:"7px 10px",borderBottom:"1px solid rgba(255,255,255,.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <Tag label={c.type} color={c.type==="Outdoor"?"#0f3460":c.type==="Indoor"?"#c00":c.type==="Furnace"?"#c00":c.type==="Evap Coil"?"#8B0000":c.type==="Air Handler"?"#6B3A2A":c.type==="Heat Pump"?"#0f3460":"#2E4053"}/>
                      <Tag label={c._mode==="minisplit"?"MS":"WH"} color={c._mode==="minisplit"?"#1428A0":"#795548"}/>
                      <span style={{fontSize:11,fontWeight:600}}>{c.item.b} {c.item.n}</span>
                      <div style={{fontSize:9,color:"#aab",marginTop:1}}>{c.item.m}{c.info?` • ${c.info}`:""}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontWeight:800,fontSize:12}}>{fmt(c.item.p)}</span>
                      <button onClick={()=>removeFromCart(i)} style={{background:"#c00",color:"#fff",border:"none",padding:"1px 6px",borderRadius:3,cursor:"pointer",fontSize:10,fontWeight:700}}>✕</button>
                    </div>
                  </div>
                ))}
              </div>}
              {addlMaterials.length>0&&<>
                <h4 style={{margin:"14px 0 8px",fontSize:13,fontWeight:700,color:"#8af"}}>Additional Materials ({addlMaterials.length})</h4>
                <div style={{background:"rgba(255,255,255,.06)",borderRadius:8,overflow:"hidden"}}>
                  {addlMaterials.map((m,i)=>(
                    <div key={i} style={{padding:"5px 10px",borderBottom:"1px solid rgba(255,255,255,.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{flex:1}}>{m.cat&&<Tag label={m.cat} color="#555"/>}<span style={{fontSize:11}}>{m.desc}</span>{(m.qty||1)>1&&<span style={{fontSize:9,color:"#aab",marginLeft:4}}>×{m.qty}</span>}</div>
                      <span style={{fontWeight:800,fontSize:11}}>{fmt(m.price*(m.qty||1))}</span>
                    </div>
                  ))}
                </div>
              </>}
            </div>
            <div>
              <h4 style={{margin:"0 0 8px",fontSize:13,fontWeight:700,color:"#8af"}}>Price Breakdown</h4>
              <div style={{background:"rgba(255,255,255,.06)",borderRadius:8,padding:14}}>
                {[["Equipment ("+cart.length+" items)",equipTotal],
                  ...(addlMaterials.length>0?[["Additional Materials ("+addlMaterials.length+")",addlTotal]]:[]),
                ].map(([l,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}}><span>{l}</span><span style={{fontWeight:700}}>{fmt(v)}</span></div>)}
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,borderTop:"1px solid rgba(255,255,255,.15)",marginTop:4,paddingTop:8}}><span>Material Subtotal</span><span style={{fontWeight:700}}>{fmt(materialTotal)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,color:"#f9a"}}><span>Tax (7%)</span><span style={{fontWeight:700}}>{fmt(tax)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}}><span style={{fontWeight:600}}>Material + Tax</span><span style={{fontWeight:700}}>{fmt(materialWithTax)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12,color:"#af8"}}><span>Margin (30%)</span><span style={{fontWeight:700}}>{fmt(margin)}</span></div>
                <div style={{borderTop:"1px solid rgba(255,255,255,.15)",marginTop:8,paddingTop:8}}>
                  {[["Labor",labor,setLabor],["Sean Labor",seanLabor,setSeanLabor]].map(([l,v,set],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12}}>
                    <span>{l}</span><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:11,color:"#aab"}}>$</span><input value={v} onChange={e=>set(e.target.value)} type="number" placeholder="0.00" style={{width:90,padding:"4px 6px",borderRadius:4,border:"1px solid #444",background:"rgba(255,255,255,.12)",color:"#fff",fontSize:12,textAlign:"right"}}/></div>
                  </div>)}
                </div>
                <div style={{borderTop:"2px solid #4caf50",marginTop:10,paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:16,fontWeight:800}}>TOTAL PROJECT PRICE</span>
                  <span style={{fontSize:20,fontWeight:900,color:"#4caf50"}}>{fmt(grandTotal)}</span>
                </div>
                <div style={{marginTop:12}}>
                  <button onClick={generatePDF} style={{width:"100%",padding:"10px",borderRadius:8,border:"2px solid #4caf50",cursor:"pointer",fontSize:13,fontWeight:800,background:"linear-gradient(135deg,#4caf50,#2E7D32)",color:"#fff"}}>📄 Generate Estimate PDF</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
